name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from commit message
        id: version
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qE "^[^:]+: [0-9]+\.[0-9]+\.[0-9]+: "; then
            VERSION=$(echo "$COMMIT_MSG" | sed -E 's/^[^:]+: ([0-9]+\.[0-9]+\.[0-9]+): .*/\1/')
            echo "commit_version=$VERSION" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Read package.json version
        if: steps.version.outputs.valid == 'true'
        id: pkg
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          echo "pkg_version=$PKG_VERSION" >> $GITHUB_OUTPUT

      - name: Compare versions
        if: steps.version.outputs.valid == 'true'
        run: |
          COMMIT_VER="${{ steps.version.outputs.commit_version }}"
          PKG_VER="${{ steps.pkg.outputs.pkg_version }}"
          if [ "$COMMIT_VER" != "$PKG_VER" ]; then
            echo "Version mismatch: commit says $COMMIT_VER, package.json says $PKG_VER"
            exit 1
          fi
          echo "Version match: $COMMIT_VER"

      - name: Skip publish (not a release commit)
        if: steps.version.outputs.valid == 'false'
        run: echo "Not a release commit, skipping publish"

      - name: Setup Node.js
        if: steps.version.outputs.valid == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.version.outputs.valid == 'true'
        run: npm install

      - name: Compile
        if: steps.version.outputs.valid == 'true'
        run: npm run compile

      - name: Publish to npm
        if: steps.version.outputs.valid == 'true'
        run: |
          npm config set provenance true
          npm publish --access public